server:
  port: 8083

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://127.0.0.1:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
        add-to-simple-url-handler-mapping: true

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

      routes:
        # ✅ Toutes les routes Django en une seule règle
        - id: authentication-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=0
        - id: service3
          uri: http://localhost:8003
          predicates:
            - Path=/recap/**
          filters:
            - StripPrefix=0

        # Node.js services
        - id: service2
          uri: lb://SERVICE-NODE-PARAM
          predicates:
            - Path=/params/**
          filters:
            - RewritePath=/params/(?<segment>.*), /api/$\{segment}
        # Ajoutez cette route dans votre gateway application.yml
        - id: service-notification
          uri: lb://SERVICE-NOTIFICATION
          predicates:
           - Path=/notifications/**
          filters:
          - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true